<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Lica Score Validation Report</title><style>:root{--bg:#f7f7f5;--panel:#fff;--text:#1f2328;--muted:#656d76;--line:#d8dee4;--accent:#0969da;--good:#1a7f37;--bad:#cf222e;--warn:#9a6700}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}header{position:sticky;top:0;background:var(--panel);z-index:10;border-bottom:1px solid var(--line);padding:24px 36px}h1{margin:0;font-size:26px}h2{font-size:21px;margin:30px 0 12px}h3{font-size:16px;margin:0 0 10px}nav{display:flex;gap:14px;margin-top:12px;flex-wrap:wrap}nav a{color:var(--accent);text-decoration:none;font-size:14px}main{max-width:1500px;margin:0 auto;padding:24px 36px 70px}.muted{color:var(--muted)}.small{font-size:12px}.grid{display:grid;gap:14px}.stats{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}.card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:16px}.stat .value{font-size:28px;font-weight:750}.stat .label{font-size:13px;color:var(--muted);margin-top:4px}.charts{grid-template-columns:repeat(auto-fit,minmax(440px,1fr))}.chart svg{width:100%;height:270px;display:block}.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-top:8px}.legend span:before{content:"";display:inline-block;width:12px;height:3px;background:currentColor;margin-right:6px;vertical-align:middle}table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid var(--line);padding:8px;text-align:left;vertical-align:top}th{color:var(--muted);font-weight:650}.good{color:var(--good);font-weight:700}.bad{color:var(--bad);font-weight:700}.tag{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:2px 8px;font-size:12px;color:var(--muted)}.group-card{margin-bottom:18px}.prompt{font-size:13px;color:var(--muted);max-width:1120px;line-height:1.45}.renders{display:grid;grid-template-columns:repeat(4,minmax(150px,1fr));gap:12px;margin-top:12px}.render{border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}.render img{width:100%;height:180px;object-fit:contain;display:block;border-bottom:1px solid var(--line);background:#fff}.render .body{padding:10px;font-size:12px}.source{font-weight:750;margin-bottom:6px}.score-row{display:flex;justify-content:space-between;gap:8px}.compare-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(370px,1fr));gap:12px}.compare-images{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}.compare-images img{width:100%;height:135px;object-fit:contain;border:1px solid var(--line);border-radius:6px;background:#fff}.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:10px 0 16px}select{border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fff;color:var(--text)}.confusion{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}@media(max-width:860px){header,main{padding-left:18px;padding-right:18px}.renders{grid-template-columns:1fr 1fr}}</style></head><body><header><h1>Lica Score Validation Report</h1><div class="muted">vtracer-free Text-to-SVG validation · epoch 0 is base Qwen · best fine-tuned checkpoint is epoch 2</div><nav><a href="#metrics">Metrics</a><a href="#gtai">GT vs AI</a><a href="#gallery">Validation Gallery</a><a href="#aivai">AI vs AI</a></nav></header><main><section id="overview"></section><section id="metrics"></section><section id="gtai"></section><section id="gallery"></section><section id="aivai"></section></main><script src="report.js"></script></body></html>
